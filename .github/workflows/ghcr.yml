name: Push to GHCR
run-name: Pushing image to github container registry

# specifies permissions for the `secrets.GITHUB_TOKEN` token
permissions:
    contents: read
    packages: write

# trigger
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v6   
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build image
        run:  docker build -t ghcr.io/felixhp05/docker-test:latest ${{ github.workspace }}
      - name: push image
        run:  docker push ghcr.io/felixhp05/docker-test:latest
    


